<!DOCTYPE html>
<html lang="en">
<head>
    <title>Vocalorie Logger</title>

    <style>
        :root {
            --bg-main: #0b1220;
            --bg-alt: #07121a;
            --panel: rgba(255, 255, 255, 0.06);
            --panel-strong: rgba(255, 255, 255, 0.1);
            --ink: #e8eef8;
            --muted: rgba(232, 238, 248, 0.72);
            --line: rgba(255, 255, 255, 0.14);
            --accent: #34d399;
            --accent-strong: #10b981;
            --warn: #f59e0b;
            --danger: #f87171;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", "Avenir Next", sans-serif;
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background: linear-gradient(180deg, var(--bg-main) 0%, var(--bg-main) 52%, var(--bg-alt) 100%);
            padding: 22px 14px 60px;
            overflow-x: hidden;
            position: relative;
        }

        .bg-glow {
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-glow::before,
        .bg-glow::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            filter: blur(120px);
        }

        .bg-glow::before {
            width: 540px;
            height: 540px;
            background: rgba(16, 185, 129, 0.22);
            top: -170px;
            left: 50%;
            transform: translateX(-50%);
        }

        .bg-glow::after {
            width: 420px;
            height: 420px;
            background: rgba(14, 165, 233, 0.18);
            right: -140px;
            bottom: 30px;
        }

        .layout {
            width: min(940px, 100%);
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            margin-bottom: 14px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            backdrop-filter: blur(8px);
        }

        .brand {
            font-weight: 800;
            letter-spacing: 0.02em;
            color: #ffffff;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: var(--muted);
            font-weight: 700;
            padding: 7px 11px;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .nav-link:hover {
            color: #ffffff;
            border-color: var(--line);
            background: rgba(255, 255, 255, 0.08);
        }

        h1 {
            text-align: center;
            font-size: clamp(2rem, 3vw, 2.6rem);
            margin: 8px 0 20px;
            letter-spacing: 0.02em;
            color: #ffffff;
            text-shadow: 0 0 18px rgba(16, 185, 129, 0.22);
        }

        h2 {
            margin: 0 0 12px;
            color: #ffffff;
        }

        .panel {
            background: var(--panel);
            border-radius: 18px;
            border: 1px solid var(--line);
            box-shadow: 0 18px 38px rgba(3, 8, 20, 0.42);
            padding: 18px;
            margin-bottom: 18px;
            backdrop-filter: blur(8px);
        }

        .top-controls {
            display: grid;
            gap: 10px;
        }

        label {
            font-weight: 700;
            font-size: 0.92rem;
            color: var(--muted);
            display: block;
            margin-bottom: 6px;
        }

        input,
        textarea {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--line);
            padding: 11px 12px;
            font-size: 1rem;
            color: var(--ink);
            background: rgba(7, 18, 26, 0.7);
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: rgba(52, 211, 153, 0.7);
            box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.18);
        }

        textarea {
            resize: vertical;
            min-height: 78px;
        }

        .inline-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.2s ease, filter 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            filter: none;
        }

        .btn-primary {
            background: var(--accent-strong);
            color: #052015;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.12);
            color: #f7fbff;
            border: 1px solid var(--line);
        }

        .btn-danger {
            background: rgba(248, 113, 113, 0.85);
            color: #fff5f5;
        }

        .btn-warm {
            background: rgba(245, 158, 11, 0.85);
            color: #fff7ed;
        }

        .hint {
            color: var(--muted);
            font-size: 0.9rem;
            margin: 0;
        }

        .status {
            min-height: 1.1rem;
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 8px;
            color: var(--muted);
        }

        .status.error {
            color: var(--danger);
        }

        .status.ok {
            color: var(--accent);
        }

        .cards {
            display: grid;
            gap: 12px;
        }

        .content-grid {
            display: grid;
            gap: 14px;
            grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
            align-items: start;
        }

        .meal-card {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
        }

        .meal-card.unresolved {
            border-color: rgba(248, 113, 113, 0.5);
            background: rgba(248, 113, 113, 0.08);
        }

        .meal-title {
            margin: 0 0 8px;
            font-size: 1.1rem;
            color: #ffffff;
        }

        .meta {
            color: var(--muted);
            font-size: 0.9rem;
            margin: 2px 0 10px;
        }

        .macro-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }

        .macro-cell {
            border: 1px solid var(--line);
            border-radius: 11px;
            padding: 8px;
            text-align: center;
            background: rgba(255, 255, 255, 0.06);
        }

        .macro-label {
            font-size: 0.72rem;
            color: var(--muted);
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .macro-value {
            font-weight: 800;
            font-size: 1rem;
            color: #ffffff;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-add {
            border: 1px solid var(--line);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            padding: 10px;
        }

        .quick-add summary {
            list-style: none;
            cursor: pointer;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffffff;
        }

        .quick-add summary::-webkit-details-marker {
            display: none;
        }

        .plus-chip {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-strong);
            color: #052015;
            font-size: 1.1rem;
            line-height: 1;
        }

        .quick-add-body {
            margin-top: 10px;
            border-top: 1px dashed var(--line);
            padding-top: 10px;
        }

        .quick-add-grid {
            display: grid;
            gap: 8px;
            grid-template-columns: 1fr;
            margin-bottom: 10px;
        }

        .totals-row {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }

        @media (max-width: 860px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .inline-grid,
            .quick-add-grid,
            .macro-grid,
            .totals-row {
                grid-template-columns: 1fr;
            }

            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

<div class="bg-glow" aria-hidden="true"></div>

<div class="layout">
    <nav class="navbar" aria-label="Main navigation">
        <a class="brand" href="/log">Vocalorie</a>
        <div class="nav-links">
            <a class="nav-link" href="/log">Log Meal</a>
            <a class="nav-link" href="/journal-page">Journal</a>
        </div>
    </nav>

    <h1>Vocalorie Logger</h1>

    <section class="panel top-controls">
        <div>
            <label for="transcript">Meal transcript (text-first)</label>
            <textarea id="transcript" placeholder="Example: I had two eggs and one toast"></textarea>
        </div>
        <div class="inline-grid">
            <button id="startMicBtn" class="btn-secondary">Start Recording</button>
            <button id="stopMicBtn" class="btn-danger" disabled>Stop Recording</button>
        </div>
        <div class="inline-grid">
            <button id="resolveBtn" class="btn-primary">Resolve Meal</button>
            <button id="clearBtn" class="btn-warm">Clear</button>
        </div>
        <div class="inline-grid">
            <button id="journalBtn" class="btn-secondary">View Journal JSON</button>
            <button id="logoutBtn" class="btn-warm">Log Out</button>
        </div>
        <p class="hint">Each parsed item becomes one staging card. Log directly, and use + Add Personal Food for quick custom entries.</p>
        <div id="status" class="status"></div>
    </section>

    <section class="content-grid">
        <section class="panel">
            <h2>Staged Items</h2>
            <div id="cards" class="cards"></div>
        </section>

        <section class="panel">
            <h2>Quick Add</h2>
            <details class="quick-add" id="quickAddDetails">
                <summary>
                    <span class="plus-chip">+</span>
                    Add Personal Food
                </summary>
                <div class="quick-add-body">
                    <form id="quickAddForm">
                        <div class="quick-add-grid">
                            <input id="quickName" name="name" placeholder="Food name" required>
                            <input id="quickCalories" name="calories" type="number" min="0" step="0.1" placeholder="Calories" required>
                            <input id="quickProtein" name="protein" type="number" min="0" step="0.1" placeholder="Protein (g)">
                            <input id="quickCarbs" name="carbs" type="number" min="0" step="0.1" placeholder="Carbs (g)">
                            <input id="quickFat" name="fat" type="number" min="0" step="0.1" placeholder="Fat (g)">
                        </div>
                        <button id="quickAddSubmit" class="btn-secondary" type="submit">Save Personal Food</button>
                    </form>
                </div>
            </details>
        </section>
    </section>

    <section class="panel">
        <h2>Session Totals</h2>
        <div id="totals" class="totals-row"></div>
    </section>
</div>

<script>
    const transcriptInput = document.getElementById("transcript");
    const startMicBtn = document.getElementById("startMicBtn");
    const stopMicBtn = document.getElementById("stopMicBtn");
    const resolveBtn = document.getElementById("resolveBtn");
    const clearBtn = document.getElementById("clearBtn");
    const journalBtn = document.getElementById("journalBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const statusEl = document.getElementById("status");
    const cardsEl = document.getElementById("cards");
    const totalsEl = document.getElementById("totals");
    const quickAddForm = document.getElementById("quickAddForm");
    const quickAddSubmit = document.getElementById("quickAddSubmit");
    const quickAddDetails = document.getElementById("quickAddDetails");
    const quickNameInput = document.getElementById("quickName");

    const state = {
        items: [],
        totals: { calories: 0, protein: 0, carbs: 0, fat: 0 }
    };

    let recognition = null;
    let speechSupported = false;
    let isRecording = false;
    let recorder = null;
    let recordingStream = null;
    let recordingChunks = [];

    function speechApi() {
        return window.SpeechRecognition || window.webkitSpeechRecognition;
    }

    function browserName() {
        const ua = navigator.userAgent;
        if (ua.includes("Firefox")) {
            return "Firefox";
        }
        if (ua.includes("Edg/")) {
            return "Edge";
        }
        if (ua.includes("Chrome")) {
            return "Chrome";
        }
        return "Unknown";
    }

    function speechBlockedReason() {
        const isLocalhost = ["localhost", "127.0.0.1"].includes(window.location.hostname);
        if (!window.isSecureContext && !isLocalhost) {
            return "Speech input requires HTTPS or localhost. Open this app on localhost or secure origin.";
        }
        return "";
    }

    async function requestMicAccess() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error("Microphone API is unavailable in this browser.");
        }

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach((track) => track.stop());
    }

    function mediaRecorderMimeType() {
        const candidates = [
            "audio/webm;codecs=opus",
            "audio/webm",
            "audio/ogg;codecs=opus",
            "audio/ogg"
        ];

        if (!window.MediaRecorder) {
            return "";
        }

        return candidates.find((mimeType) => MediaRecorder.isTypeSupported(mimeType)) || "";
    }

    function speechErrorMessage(errorCode) {
        if (errorCode === "not-allowed" || errorCode === "service-not-allowed") {
            return "Microphone permission denied. Allow mic access in browser site settings.";
        }
        if (errorCode === "audio-capture") {
            return "No microphone was found. Check your input device and OS microphone settings.";
        }
        if (errorCode === "network") {
            return "Speech service network error. Check internet connection and try again.";
        }
        if (errorCode === "aborted") {
            return "Recording was interrupted. Try starting again.";
        }
        return `Speech error: ${errorCode || "unknown"}`;
    }

    function configureSpeech() {
        const SpeechRecognition = speechApi();
        speechSupported = Boolean(SpeechRecognition);
        const blockedReason = speechBlockedReason();
        const canRecordAudio = Boolean(window.MediaRecorder && navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

        if (blockedReason) {
            startMicBtn.disabled = true;
            stopMicBtn.disabled = true;
            const message = blockedReason || "Speech input is not available in this browser. Use text input.";
            setStatus(message, "");
            return;
        }

        if (speechSupported) {
            recognition = new SpeechRecognition();
            recognition.lang = "en-US";
            recognition.interimResults = true;
            recognition.continuous = true;

            recognition.onstart = () => {
                isRecording = true;
                startMicBtn.disabled = true;
                stopMicBtn.disabled = false;
                setStatus("Listening...", "");
            };

            recognition.onresult = (event) => {
                const parts = [];
                for (let i = 0; i < event.results.length; i += 1) {
                    parts.push(event.results[i][0].transcript);
                }
                transcriptInput.value = parts.join(" ").trim();
                setStatus("Listening... transcript is updating.", "");
            };

            recognition.onerror = (event) => {
                isRecording = false;
                setStatus(speechErrorMessage(event.error), "error");
                startMicBtn.disabled = false;
                stopMicBtn.disabled = true;
            };

            recognition.onend = () => {
                isRecording = false;
                startMicBtn.disabled = false;
                stopMicBtn.disabled = true;
                if (transcriptInput.value.trim()) {
                    setStatus("Recording stopped. Review transcript and press Resolve Meal.", "ok");
                } else {
                    setStatus("No speech detected. Try again.", "error");
                }
            };
            return;
        }

        if (canRecordAudio) {
            startMicBtn.disabled = false;
            stopMicBtn.disabled = true;
            setStatus(`${browserName()} does not support live speech recognition here. Start Recording will capture audio and transcribe it after you stop.`, "ok");
            return;
        }

        startMicBtn.disabled = true;
        stopMicBtn.disabled = true;
        setStatus("Speech input is not available in this browser. Use text input.", "");
    }

    async function startRecording() {
        if (isRecording) {
            setStatus("Recording is already running.", "");
            return;
        }

        if (speechSupported && recognition) {
            try {
                startMicBtn.disabled = true;
                stopMicBtn.disabled = false;
                await requestMicAccess();
                setStatus("Starting microphone...", "");
                recognition.start();
            } catch (error) {
                isRecording = false;
                startMicBtn.disabled = false;
                stopMicBtn.disabled = true;
                const message = error && error.name === "NotAllowedError"
                    ? "Microphone permission denied. Allow mic access and try again."
                    : "Could not start recording. Try again.";
                setStatus(message, "error");
            }
            return;
        }

        if (!window.MediaRecorder || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            setStatus("Speech input is not available in this browser.", "error");
            return;
        }

        try {
            recordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mimeType = mediaRecorderMimeType();

            recordingChunks = [];
            recorder = mimeType ? new MediaRecorder(recordingStream, { mimeType }) : new MediaRecorder(recordingStream);
            recorder.ondataavailable = (event) => {
                if (event.data && event.data.size > 0) {
                    recordingChunks.push(event.data);
                }
            };
            recorder.onerror = (event) => {
                isRecording = false;
                startMicBtn.disabled = false;
                stopMicBtn.disabled = true;
                setStatus(`Recording error: ${event.error?.name || "unknown"}`, "error");
                if (recordingStream) {
                    recordingStream.getTracks().forEach((track) => track.stop());
                    recordingStream = null;
                }
                recorder = null;
            };
            recorder.onstop = async () => {
                isRecording = false;
                startMicBtn.disabled = false;
                stopMicBtn.disabled = true;

                if (recordingStream) {
                    recordingStream.getTracks().forEach((track) => track.stop());
                    recordingStream = null;
                }

                const finalRecorder = recorder;
                recorder = null;

                if (!recordingChunks.length) {
                    setStatus("No speech detected. Try again.", "error");
                    recordingChunks = [];
                    return;
                }

                const blob = new Blob(recordingChunks, { type: finalRecorder?.mimeType || mimeType || "audio/webm" });
                recordingChunks = [];

                try {
                    setStatus("Transcribing audio...", "");
                    const transcript = await transcribeAudio(blob);
                    if (transcript) {
                        transcriptInput.value = transcript;
                        setStatus("Recording stopped. Review transcript and press Resolve Meal.", "ok");
                    } else {
                        setStatus("No speech detected. Try again.", "error");
                    }
                } catch (error) {
                    setStatus(error.message || "Failed to transcribe recording.", "error");
                }
            };

            startMicBtn.disabled = true;
            stopMicBtn.disabled = false;
            isRecording = true;
            setStatus("Recording audio...", "");
            recorder.start();
        } catch (error) {
            isRecording = false;
            startMicBtn.disabled = false;
            stopMicBtn.disabled = true;
            const message = error && error.name === "NotAllowedError"
                ? "Microphone permission denied. Allow mic access and try again."
                : "Could not start recording. Try again.";
            setStatus(message, "error");
        }
    }

    function stopRecording() {
        if (speechSupported && recognition) {
            if (!isRecording) {
                return;
            }
            stopMicBtn.disabled = true;
            setStatus("Stopping recording...", "");
            recognition.stop();
            return;
        }

        if (!recorder || !isRecording) {
            return;
        }
        stopMicBtn.disabled = true;
        setStatus("Stopping recording...", "");
        recorder.stop();
    }

    function fmt(value) {
        const n = Number(value || 0);
        return Number.isFinite(n) ? n.toFixed(1) : "0.0";
    }

    function setStatus(message, type = "") {
        statusEl.textContent = message;
        statusEl.className = `status ${type}`;
    }

    function readQuickAddValues() {
        const form = new FormData(quickAddForm);
        const name = String(form.get("name") || "").trim();
        const calories = Number(form.get("calories"));
        const protein = Number(form.get("protein") || 0);
        const carbs = Number(form.get("carbs") || 0);
        const fat = Number(form.get("fat") || 0);

        if (!name) {
            throw new Error("Food name is required.");
        }
        if (!Number.isFinite(calories) || calories < 0) {
            throw new Error("Calories must be a non-negative number.");
        }
        if ([protein, carbs, fat].some(v => !Number.isFinite(v) || v < 0)) {
            throw new Error("Protein, carbs, and fat must be non-negative numbers.");
        }

        return { name, calories, protein, carbs, fat };
    }

    async function apiFetch(path, options = {}) {
        const response = await fetch(path, options);
        let payload = {};
        try {
            payload = await response.json();
        } catch {
            payload = {};
        }

        if (!response.ok) {
            const detail = payload.detail || "Request failed";
            throw new Error(detail);
        }

        return payload;
    }

    async function resolveMeal() {
        const transcript = transcriptInput.value.trim();
        if (!transcript) {
            setStatus("Please enter a meal transcript.", "error");
            return;
        }

        resolveBtn.disabled = true;
        setStatus("Resolving meal...", "");

        try {
            const payload = await apiFetch("/foods/process", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ raw_transcript: transcript })
            });

            state.items = payload.staged_items || payload.results || [];
            state.totals = payload.totals || { calories: 0, protein: 0, carbs: 0, fat: 0 };

            if (!state.items.length) {
                setStatus("No items were parsed from that transcript.", "error");
            } else {
                setStatus("Staging ready. Use Log Meal per item.", "ok");
            }

            render();
        } catch (error) {
            setStatus(error.message || "Failed to resolve meal.", "error");
        } finally {
            resolveBtn.disabled = false;
        }
    }

    async function logItem(item) {
        const button = document.querySelector(`[data-log='${item.client_item_id}']`);
        if (!button) {
            return;
        }
        button.disabled = true;

        try {
            await apiFetch("/foods/confirm", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    items: [
                        {
                            name: item.name,
                            calories: Number(item.calories || 0),
                            protein: Number(item.protein || 0),
                            carbs: Number(item.carbs || 0),
                            fat: Number(item.fat || 0)
                        }
                    ]
                })
            });

            setStatus(`Logged ${item.name}.`, "ok");
        } catch (error) {
            setStatus(error.message || "Failed to log meal.", "error");
        } finally {
            button.disabled = false;
        }
    }

    async function createPersonalFood(event) {
        event.preventDefault();
        quickAddSubmit.disabled = true;
        try {
            const values = readQuickAddValues();

            await apiFetch("/foods/manual", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    food_name: values.name,
                    calories: values.calories,
                    protein: values.protein,
                    carbs: values.carbs,
                    fat: values.fat,
                    destination: "personal"
                })
            });

            setStatus(`Saved ${values.name} to personal foods.`, "ok");
            quickAddForm.reset();
            quickAddDetails.open = true;
            quickNameInput.focus();
        } catch (error) {
            setStatus(error.message || "Failed to create personal food.", "error");
        } finally {
            quickAddSubmit.disabled = false;
        }
    }

    async function transcribeAudio(blob) {
        const response = await fetch("/transcribe", {
            method: "POST",
            headers: {
                "Content-Type": blob.type || "audio/webm"
            },
            body: blob
        });

        let payload = {};
        try {
            payload = await response.json();
        } catch {
            payload = {};
        }

        if (!response.ok) {
            throw new Error(payload.detail || "Failed to transcribe recording.");
        }

        return String(payload.transcript || "").trim();
    }

    function cardTemplate(item) {
        const unresolvedClass = item.resolved ? "" : "unresolved";
        const unresolvedNote = item.resolved ? "" : "<p class='meta'>No resolver match found. Add a personal food from the Quick Add panel.</p>";

        return `
            <article class="meal-card ${unresolvedClass}">
                <h3 class="meal-title">${item.quantity} ${item.unit} - ${item.name}</h3>
                <p class="meta">Source: ${item.source || "unknown"} | ${item.category || "unknown"}</p>
                ${unresolvedNote}
                <div class="macro-grid">
                    <div class="macro-cell"><div class="macro-label">Calories</div><div class="macro-value">${fmt(item.calories)}</div></div>
                    <div class="macro-cell"><div class="macro-label">Protein</div><div class="macro-value">${fmt(item.protein)} g</div></div>
                    <div class="macro-cell"><div class="macro-label">Carbs</div><div class="macro-value">${fmt(item.carbs)} g</div></div>
                    <div class="macro-cell"><div class="macro-label">Fat</div><div class="macro-value">${fmt(item.fat)} g</div></div>
                </div>
                <div class="card-actions">
                    <button class="btn-primary" data-log="${item.client_item_id}" ${item.resolved ? "" : "disabled"}>Log Meal</button>
                </div>
            </article>
        `;
    }

    function renderTotals() {
        const t = state.totals;
        totalsEl.innerHTML = `
            <div class="macro-cell"><div class="macro-label">Calories</div><div class="macro-value">${fmt(t.calories)}</div></div>
            <div class="macro-cell"><div class="macro-label">Protein</div><div class="macro-value">${fmt(t.protein)} g</div></div>
            <div class="macro-cell"><div class="macro-label">Carbs</div><div class="macro-value">${fmt(t.carbs)} g</div></div>
            <div class="macro-cell"><div class="macro-label">Fat</div><div class="macro-value">${fmt(t.fat)} g</div></div>
        `;
    }

    function bindActions() {
        state.items.forEach((item) => {
            const logBtn = document.querySelector(`[data-log='${item.client_item_id}']`);
            if (logBtn) {
                logBtn.addEventListener("click", () => logItem(item));
            }
        });
    }

    function render() {
        cardsEl.innerHTML = state.items.map(cardTemplate).join("");
        renderTotals();
        bindActions();
    }

    function clearAll() {
        state.items = [];
        state.totals = { calories: 0, protein: 0, carbs: 0, fat: 0 };
        transcriptInput.value = "";
        setStatus("Cleared staged items.", "");
        render();
    }

    async function openJournal() {
        try {
            const payload = await apiFetch("/journal");
            const w = window.open("", "_blank");
            if (w) {
                w.document.write(`<pre>${JSON.stringify(payload, null, 2)}</pre>`);
            }
        } catch (error) {
            setStatus(error.message || "Failed to load journal.", "error");
        }
    }

    async function logout() {
        try {
            await apiFetch("/logout", {
                method: "POST",
                headers: { "Content-Type": "application/json" }
            });
            window.location.href = "/auth";
        } catch (error) {
            setStatus(error.message || "Failed to log out.", "error");
        }
    }

    resolveBtn.addEventListener("click", resolveMeal);
    startMicBtn.addEventListener("click", startRecording);
    stopMicBtn.addEventListener("click", stopRecording);
    clearBtn.addEventListener("click", clearAll);
    journalBtn.addEventListener("click", openJournal);
    logoutBtn.addEventListener("click", logout);
    quickAddForm.addEventListener("submit", createPersonalFood);

    configureSpeech();
    render();
</script>

</body>
</html>
