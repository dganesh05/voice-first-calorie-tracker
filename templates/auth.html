<!DOCTYPE html>
<html lang="en">
<head>
    <title>Vocalorie Auth</title>
    <style>
        :root {
            --bg-main: #0b1220;
            --bg-alt: #07121a;
            --panel: rgba(255, 255, 255, 0.06);
            --panel-strong: rgba(255, 255, 255, 0.1);
            --ink: #e8eef8;
            --accent: #10b981;
            --accent-warm: #f59e0b;
            --muted: rgba(232, 238, 248, 0.72);
            --danger: #f87171;
            --line: rgba(255, 255, 255, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", "Avenir Next", sans-serif;
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background: linear-gradient(180deg, var(--bg-main) 0%, var(--bg-main) 58%, var(--bg-alt) 100%);
            display: grid;
            place-items: center;
            padding: 16px;
            overflow-x: hidden;
            position: relative;
        }

        .bg-glow {
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-glow::before,
        .bg-glow::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            filter: blur(120px);
        }

        .bg-glow::before {
            width: 520px;
            height: 520px;
            background: rgba(16, 185, 129, 0.24);
            top: -170px;
            left: 50%;
            transform: translateX(-50%);
        }

        .bg-glow::after {
            width: 420px;
            height: 420px;
            background: rgba(14, 165, 233, 0.18);
            right: -140px;
            bottom: -50px;
        }

        .card {
            width: min(680px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: 0 18px 38px rgba(3, 8, 20, 0.42);
            padding: 20px;
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 1;
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 2.8vw, 2.4rem);
            color: #ffffff;
            text-shadow: 0 0 18px rgba(16, 185, 129, 0.24);
        }

        p {
            color: var(--muted);
            margin: 0 0 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
        }

        h2 {
            margin-top: 2px;
            color: #ffffff;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            font-size: 0.95rem;
            margin-bottom: 8px;
            background: rgba(7, 18, 26, 0.7);
            color: var(--ink);
            outline: none;
        }

        input:focus {
            border-color: rgba(52, 211, 153, 0.7);
            box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.18);
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.15s ease, filter 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        .btn-primary {
            background: var(--accent);
            color: #052015;
        }

        .btn-warm {
            background: var(--accent-warm);
            color: #fff7ed;
        }

        .status {
            min-height: 1.2rem;
            margin-top: 12px;
            font-weight: 700;
        }

        .status.error {
            color: var(--danger);
        }

        .status.ok {
            color: #34d399;
        }

        @media (max-width: 740px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-glow" aria-hidden="true"></div>
    <main class="card">
        <h1>Vocalorie</h1>
        <p>Create an account or sign in to access your logger, journal, and profile data.</p>

        <section class="grid">
            <form id="loginForm" class="panel">
                <h2>Sign In</h2>
                <label for="loginEmail">Email</label>
                <input id="loginEmail" type="email" required autocomplete="email">
                <label for="loginPassword">Password</label>
                <input id="loginPassword" type="password" required autocomplete="current-password">
                <button class="btn-primary" type="submit">Sign In</button>
            </form>

            <form id="registerForm" class="panel">
                <h2>Create Account</h2>
                <label for="registerName">Display name</label>
                <input id="registerName" type="text" placeholder="Optional" autocomplete="name">
                <label for="registerEmail">Email</label>
                <input id="registerEmail" type="email" required autocomplete="email">
                <label for="registerPassword">Password</label>
                <input id="registerPassword" type="password" required autocomplete="new-password">
                <label for="registerGoal">Daily calorie goal</label>
                <input id="registerGoal" type="number" min="500" step="1" value="2000">
                <button class="btn-warm" type="submit">Create Account</button>
            </form>
        </section>

        <div id="status" class="status"></div>
    </main>

    <script>
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");
        const statusEl = document.getElementById("status");

        function setStatus(message, type = "") {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        async function apiFetch(path, options = {}) {
            const response = await fetch(path, options);
            let payload = {};
            try {
                payload = await response.json();
            } catch {
                payload = {};
            }
            if (!response.ok) {
                throw new Error(payload.detail || "Request failed");
            }
            return payload;
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            setStatus("Signing in...");

            try {
                await apiFetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById("loginEmail").value.trim(),
                        password: document.getElementById("loginPassword").value
                    })
                });
                setStatus("Signed in. Redirecting...", "ok");
                window.location.href = "/log";
            } catch (error) {
                setStatus(error.message || "Sign in failed.", "error");
            }
        });

        registerForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            setStatus("Creating account...");

            const rawGoal = Number(document.getElementById("registerGoal").value || 2000);
            const dailyGoal = Number.isFinite(rawGoal) ? rawGoal : 2000;

            try {
                await apiFetch("/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById("registerEmail").value.trim(),
                        password: document.getElementById("registerPassword").value,
                        display_name: document.getElementById("registerName").value.trim() || null,
                        daily_calorie_goal: dailyGoal
                    })
                });
                setStatus("Account created. Redirecting...", "ok");
                window.location.href = "/log";
            } catch (error) {
                setStatus(error.message || "Registration failed.", "error");
            }
        });
    </script>
</body>
</html>
